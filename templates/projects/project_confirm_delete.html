{% extends "base.html" %}

{% block title %}Delete "{{ object.name }}" — TaskFlow{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 62px);">
  <div class="w-100 text-center" style="max-width: 440px; padding: 2rem 1rem;">

    <div class="mb-3" style="font-size: 2.5rem;">
      <i class="bi bi-trash3" style="color: var(--tf-danger);"></i>
    </div>
    <h1 class="h4 fw-bold mb-2">Delete project?</h1>
    <p class="text-muted mb-1">
      You are about to delete <strong>"{{ object.name }}"</strong>.
    </p>
    <p class="text-danger small mb-4">
      This will also delete all tasks inside it. This action cannot be undone.
    </p>

    <div class="tf-card p-4">
      <form method="POST">
        {% csrf_token %}
        <button type="submit" id="btn-confirm-delete" class="btn btn-danger w-100 mb-2 fw-semibold">
          <i class="bi bi-trash3 me-1"></i> Yes, delete it
        </button>
        <a href="{% url 'projects:list' %}" class="btn btn-outline-secondary w-100">
          Cancel
        </a>
      </form>
    </div>

  </div>
</div>
{% endblock %}
