{% extends "base.html" %}

{% block title %}Server Error — TaskFlow{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 62px);">
  <div class="text-center" style="padding: 2rem 1rem;">
    <div style="font-size: 5rem; font-weight: 800; color: #dc2626; line-height: 1;">
      500
    </div>
    <h1 class="h3 fw-bold mt-2 mb-2">Server error</h1>

    </p>
    <a href="/projects/" class="btn btn-tf-primary">
      <i class="bi bi-arrow-clockwise me-1"></i> Try again
    </a>
  </div>
</div>
{% endblock %}
