{% extends "base.html" %}
{% load i18n %}

{% block title %}Log Out — TaskFlow{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 62px);">
  <div class="w-100 text-center" style="max-width: 400px; padding: 2rem 1rem;">

    <div class="mb-3" style="font-size: 2.5rem;">
      <i class="bi bi-box-arrow-right" style="color: var(--tf-primary);"></i>
    </div>
    <h1 class="h3 fw-bold mb-2">Log out?</h1>
    <p class="text-muted mb-4">Are you sure you want to sign out of TaskFlow?</p>

    <div class="tf-card p-4">
      <form method="POST" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" id="btn-logout-confirm" class="btn btn-tf-primary w-100 mb-2">
          <i class="bi bi-box-arrow-right me-1"></i> Yes, log me out
        </button>
        <a href="{% url 'projects:list' %}" class="btn btn-outline-secondary w-100">
          Cancel
        </a>
      </form>
    </div>

  </div>
</div>
{% endblock %}
